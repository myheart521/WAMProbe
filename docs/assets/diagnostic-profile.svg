<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="500" viewBox="0 0 1280 500" role="img" aria-labelledby="title desc">
  <title id="title">PointMass diagnostic profile</title>
  <desc id="desc">The oracle, wrong-direction, and action-agnostic baselines have distinct direction and regret results, showing why action dependence alone is insufficient.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071827"/>
      <stop offset="1" stop-color="#111c35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1280" height="500" rx="24" fill="url(#bg)"/>
  <text x="64" y="62" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="800">Why a metric profile matters</text>
  <text x="64" y="92" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Committed PointMass-2D demo · 12 contexts · seed 7 · exact values from the generated report</text>

  <g transform="translate(64 132)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <g transform="translate(246 0)" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="1">
      <text x="112" y="0" text-anchor="middle">ACTION DEPENDENCE ↑</text>
      <text x="376" y="0" text-anchor="middle">DIRECTION ALIGNMENT ↑</text>
      <text x="640" y="0" text-anchor="middle">TOP-1 REGRET ↓</text>
    </g>

    <g transform="translate(0 24)">
      <rect width="1152" height="82" rx="15" fill="#0f2435" stroke="#2dd4bf" stroke-opacity="0.35"/>
      <circle cx="37" cy="41" r="14" fill="#134e4a" stroke="#5eead4"/><path d="M30 41L35 46L45 35" fill="none" stroke="#99f6e4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="65" y="36" fill="#f8fafc" font-size="16" font-weight="750">oracle-pointmass</text>
      <text x="65" y="57" fill="#64748b" font-size="11">exact dynamics</text>
      <g font-size="25" font-weight="800" text-anchor="middle">
        <text x="358" y="49" fill="#5eead4">1.00</text>
        <text x="622" y="49" fill="#5eead4">1.00</text>
        <text x="886" y="49" fill="#5eead4">0.00</text>
      </g>
      <rect x="1024" y="23" width="98" height="36" rx="18" fill="#134e4a"/><text x="1073" y="46" text-anchor="middle" fill="#99f6e4" font-size="12" font-weight="750">CORRECT</text>
    </g>

    <g transform="translate(0 122)">
      <rect width="1152" height="82" rx="15" fill="#251b29" stroke="#fb7185" stroke-opacity="0.38"/>
      <circle cx="37" cy="41" r="14" fill="#4c0519" stroke="#fb7185"/><path d="M31 35L43 47M43 35L31 47" stroke="#fecdd3" stroke-width="3" stroke-linecap="round"/>
      <text x="65" y="36" fill="#f8fafc" font-size="16" font-weight="750">wrong-direction</text>
      <text x="65" y="57" fill="#64748b" font-size="11">reacts, but reverses motion</text>
      <g font-size="25" font-weight="800" text-anchor="middle">
        <text x="358" y="49" fill="#5eead4">1.00</text>
        <text x="622" y="49" fill="#fb7185">−1.00</text>
        <text x="886" y="49" fill="#fb7185">2.00</text>
      </g>
      <rect x="1024" y="23" width="98" height="36" rx="18" fill="#4c0519"/><text x="1073" y="46" text-anchor="middle" fill="#fecdd3" font-size="12" font-weight="750">REVERSED</text>
    </g>

    <g transform="translate(0 220)">
      <rect width="1152" height="82" rx="15" fill="#242317" stroke="#fbbf24" stroke-opacity="0.35"/>
      <circle cx="37" cy="41" r="14" fill="#422006" stroke="#fbbf24"/><path d="M30 41H44" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
      <text x="65" y="36" fill="#f8fafc" font-size="16" font-weight="750">action-agnostic</text>
      <text x="65" y="57" fill="#64748b" font-size="11">same future for every action</text>
      <g font-size="25" font-weight="800" text-anchor="middle">
        <text x="358" y="49" fill="#fbbf24">0.00</text>
        <text x="622" y="49" fill="#fbbf24">0.00</text>
        <text x="886" y="49" fill="#fbbf24">1.00</text>
      </g>
      <rect x="1024" y="23" width="98" height="36" rx="18" fill="#422006"/><text x="1073" y="46" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="750">IGNORES a</text>
    </g>
  </g>

  <text x="640" y="468" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="650">High action dependence is necessary in this diagnostic—but it is not evidence of correct dynamics or useful control.</text>
</svg>
