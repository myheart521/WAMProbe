<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="540" viewBox="0 0 1280 540" role="img" aria-labelledby="title desc">
  <title id="title">WAMProbe evaluation pipeline</title>
  <desc id="desc">WAMProbe restores one shared context, branches candidate actions, compares model and reference futures, reports a metric profile, and tests action selection.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="1280" height="540" rx="24" fill="url(#bg)"/>
  <text x="64" y="64" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="800">One context. Many actions. A metric profile you can audit.</text>
  <text x="64" y="94" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">The evaluator keeps causal dependence, physical correctness, and control value separate.</text>
  <rect x="64" y="116" width="1152" height="4" rx="2" fill="url(#line)" opacity="0.9"/>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <g transform="translate(64 164)">
      <rect width="196" height="196" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <rect width="196" height="8" rx="4" fill="#14b8a6"/>
      <circle cx="98" cy="65" r="27" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2"/>
      <circle cx="98" cy="65" r="6" fill="#0f766e"/>
      <text x="98" y="115" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="750">1 · Shared context</text>
      <text x="98" y="141" text-anchor="middle" fill="#64748b" font-size="12">same observation</text>
      <text x="98" y="160" text-anchor="middle" fill="#64748b" font-size="12">same robot/world state</text>
    </g>

    <g transform="translate(304 164)">
      <rect width="196" height="196" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <rect width="196" height="8" rx="4" fill="#0ea5e9"/>
      <g transform="translate(38 43)" fill="#e0f2fe" stroke="#0284c7">
        <rect width="49" height="30" rx="8"/>
        <rect x="71" width="49" height="30" rx="8"/>
        <rect y="42" width="49" height="30" rx="8"/>
        <rect x="71" y="42" width="49" height="30" rx="8"/>
      </g>
      <g fill="#0369a1" font-size="11" font-weight="700" text-anchor="middle">
        <text x="62" y="62">a₀</text><text x="133" y="62">a₁</text>
        <text x="62" y="104">a₂</text><text x="133" y="104">aₖ</text>
      </g>
      <text x="98" y="137" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="750">2 · Action branches</text>
      <text x="98" y="163" text-anchor="middle" fill="#64748b" font-size="12">no-op · candidates · expert</text>
    </g>

    <g transform="translate(544 164)">
      <rect width="196" height="196" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <rect width="196" height="8" rx="4" fill="#3b82f6"/>
      <g transform="translate(33 43)">
        <path d="M0 47C28 4 55 3 88 37S123 61 130 12" fill="none" stroke="#14b8a6" stroke-width="5" stroke-linecap="round"/>
        <path d="M0 58C31 23 55 10 87 43S122 68 130 22" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 6"/>
      </g>
      <circle cx="53" cy="112" r="4" fill="#14b8a6"/>
      <text x="64" y="116" fill="#64748b" font-size="10">prediction</text>
      <circle cx="126" cy="112" r="4" fill="#f59e0b"/>
      <text x="137" y="116" fill="#64748b" font-size="10">reference</text>
      <text x="98" y="143" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="750">3 · Paired futures</text>
      <text x="98" y="169" text-anchor="middle" fill="#64748b" font-size="12">model vs simulator/data</text>
    </g>

    <g transform="translate(784 164)">
      <rect width="196" height="196" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <rect width="196" height="8" rx="4" fill="#6366f1"/>
      <g transform="translate(35 43)">
        <rect width="126" height="12" rx="6" fill="#e2e8f0"/><rect width="106" height="12" rx="6" fill="#14b8a6"/>
        <rect y="27" width="126" height="12" rx="6" fill="#e2e8f0"/><rect y="27" width="88" height="12" rx="6" fill="#3b82f6"/>
        <rect y="54" width="126" height="12" rx="6" fill="#e2e8f0"/><rect y="54" width="59" height="12" rx="6" fill="#f59e0b"/>
      </g>
      <text x="98" y="137" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="750">4 · Metric profile</text>
      <text x="98" y="159" text-anchor="middle" fill="#64748b" font-size="11">dependence · direction</text>
      <text x="98" y="176" text-anchor="middle" fill="#64748b" font-size="11">ADE/FDE · uncertainty</text>
    </g>

    <g transform="translate(1024 164)">
      <rect width="192" height="196" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <rect width="192" height="8" rx="4" fill="#8b5cf6"/>
      <g transform="translate(45 37)">
        <circle cx="51" cy="40" r="34" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
        <path d="M33 42L46 55L72 25" fill="none" stroke="#7c3aed" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="96" y="137" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="750">5 · Control test</text>
      <text x="96" y="159" text-anchor="middle" fill="#64748b" font-size="11">ranking · top-1 regret</text>
      <text x="96" y="176" text-anchor="middle" fill="#64748b" font-size="11">execute · observe · replan</text>
    </g>
  </g>

  <g fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)">
    <path d="M266 262H294"/><path d="M506 262H534"/><path d="M746 262H774"/><path d="M986 262H1014"/>
  </g>

  <g transform="translate(64 404)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="1152" height="86" rx="16" fill="#0f172a"/>
    <text x="30" y="36" fill="#f8fafc" font-size="16" font-weight="750">No single composite score</text>
    <text x="30" y="61" fill="#94a3b8" font-size="13">Plausible-looking futures may ignore actions, reverse dynamics, or rank candidates poorly.</text>
    <g transform="translate(830 22)" font-size="12" font-weight="700">
      <rect width="86" height="40" rx="20" fill="#134e4a"/><text x="43" y="25" text-anchor="middle" fill="#99f6e4">causality</text>
      <rect x="96" width="86" height="40" rx="20" fill="#1e3a8a"/><text x="139" y="25" text-anchor="middle" fill="#bfdbfe">accuracy</text>
      <rect x="192" width="96" height="40" rx="20" fill="#4c1d95"/><text x="240" y="25" text-anchor="middle" fill="#ddd6fe">control value</text>
    </g>
  </g>
</svg>
