<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-labelledby="title desc">
  <title id="title">WAMProbe — Counterfactual evaluation for World Action Models</title>
  <desc id="desc">A shared initial state branches into no-op, left, right, and expert actions so predicted futures can be compared with reference futures.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06121f"/>
      <stop offset="0.55" stop-color="#0b1f35"/>
      <stop offset="1" stop-color="#102b44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#93c5fd" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="1280" height="480" rx="26" fill="url(#background)"/>
  <rect width="1280" height="480" rx="26" fill="url(#grid)"/>
  <circle cx="1040" cy="130" r="310" fill="url(#glow)"/>
  <circle cx="115" cy="445" r="220" fill="#2563eb" opacity="0.07"/>

  <g transform="translate(72 68)">
    <rect width="136" height="30" rx="15" fill="#2dd4bf" fill-opacity="0.12" stroke="#5eead4" stroke-opacity="0.4"/>
    <circle cx="17" cy="15" r="4" fill="#5eead4"/>
    <text x="30" y="20" fill="#99f6e4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">OPEN SOURCE</text>

    <text x="0" y="103" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="68" font-weight="800" letter-spacing="-2">WAMProbe</text>
    <rect x="2" y="120" width="338" height="5" rx="2.5" fill="url(#accent)"/>
    <text x="0" y="171" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="650">Do predicted futures obey the action?</text>
    <text x="0" y="211" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Counterfactual evaluation for World Action Models</text>

    <g transform="translate(0 255)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="650">
      <rect width="154" height="38" rx="19" fill="#0f766e" fill-opacity="0.26" stroke="#2dd4bf" stroke-opacity="0.5"/>
      <text x="77" y="24" text-anchor="middle" fill="#ccfbf1">Causal consistency</text>
      <rect x="166" width="126" height="38" rx="19" fill="#1d4ed8" fill-opacity="0.24" stroke="#60a5fa" stroke-opacity="0.5"/>
      <text x="229" y="24" text-anchor="middle" fill="#dbeafe">Control utility</text>
      <rect x="304" width="124" height="38" rx="19" fill="#7c3aed" fill-opacity="0.2" stroke="#a78bfa" stroke-opacity="0.5"/>
      <text x="366" y="24" text-anchor="middle" fill="#ede9fe">Reproducible</text>
    </g>
  </g>

  <g transform="translate(672 56)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="536" height="368" rx="24" fill="#071827" fill-opacity="0.88" stroke="#60a5fa" stroke-opacity="0.23"/>
    <text x="28" y="40" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="1.4">PAIRED INTERVENTIONS</text>

    <g transform="translate(48 76)">
      <circle cx="68" cy="106" r="41" fill="#0f766e" fill-opacity="0.24" stroke="#5eead4" stroke-width="2"/>
      <circle cx="68" cy="106" r="7" fill="#5eead4"/>
      <text x="68" y="163" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="650">shared state s₀</text>

      <path d="M110 106C158 106 166 28 218 28" fill="none" stroke="#64748b" stroke-width="2"/>
      <path d="M110 106C158 106 166 80 218 80" fill="none" stroke="#64748b" stroke-width="2"/>
      <path d="M110 106C158 106 166 132 218 132" fill="none" stroke="#64748b" stroke-width="2"/>
      <path d="M110 106C158 106 166 184 218 184" fill="none" stroke="#64748b" stroke-width="2"/>

      <g font-size="12" font-weight="650">
        <rect x="218" y="10" width="98" height="36" rx="10" fill="#172554" stroke="#60a5fa" stroke-opacity="0.45"/>
        <text x="267" y="33" text-anchor="middle" fill="#dbeafe">no-op</text>
        <rect x="218" y="62" width="98" height="36" rx="10" fill="#172554" stroke="#60a5fa" stroke-opacity="0.45"/>
        <text x="267" y="85" text-anchor="middle" fill="#dbeafe">move left</text>
        <rect x="218" y="114" width="98" height="36" rx="10" fill="#172554" stroke="#60a5fa" stroke-opacity="0.45"/>
        <text x="267" y="137" text-anchor="middle" fill="#dbeafe">move right</text>
        <rect x="218" y="166" width="98" height="36" rx="10" fill="#172554" stroke="#60a5fa" stroke-opacity="0.45"/>
        <text x="267" y="189" text-anchor="middle" fill="#dbeafe">expert act</text>
      </g>

      <g transform="translate(348 0)">
        <path d="M0 28H38" stroke="#475569" stroke-width="2"/>
        <path d="M0 80H38" stroke="#475569" stroke-width="2"/>
        <path d="M0 132H38" stroke="#475569" stroke-width="2"/>
        <path d="M0 184H38" stroke="#475569" stroke-width="2"/>
        <g fill="#2dd4bf">
          <circle cx="52" cy="28" r="7"/>
          <circle cx="52" cy="80" r="7"/>
          <circle cx="52" cy="132" r="7"/>
          <circle cx="52" cy="184" r="7"/>
        </g>
        <g fill="none" stroke="#fbbf24" stroke-width="2">
          <circle cx="70" cy="28" r="7"/>
          <circle cx="65" cy="80" r="7"/>
          <circle cx="78" cy="132" r="7"/>
          <circle cx="56" cy="184" r="7"/>
        </g>
      </g>
    </g>

    <g transform="translate(300 315)" font-size="11">
      <circle cx="0" cy="0" r="5" fill="#2dd4bf"/>
      <text x="12" y="4" fill="#94a3b8">predicted future</text>
      <circle cx="117" cy="0" r="5" fill="none" stroke="#fbbf24" stroke-width="2"/>
      <text x="129" y="4" fill="#94a3b8">reference future</text>
    </g>
  </g>
</svg>
