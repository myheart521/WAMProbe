name: Experiment result
description: Submit a reproducible WAMProbe result for review
title: "[Result]: "
labels: ["experiment-result", "reproduction"]
body:
  - type: markdown
    attributes:
      value: >-
        Submit structured evidence, not only a screenshot. Do not include tokens,
        credentials, private datasets, browser sessions, or model weights.
  - type: input
    id: wamprobe_revision
    attributes:
      label: WAMProbe version and commit
      placeholder: 0.1.0rc1 / full Git commit SHA
    validations:
      required: true
  - type: textarea
    id: model_provenance
    attributes:
      label: Adapter and model provenance
      description: Include adapter revision, upstream repository revision, checkpoint ID/hash, license, and preprocessing configuration.
    validations:
      required: true
  - type: textarea
    id: benchmark
    attributes:
      label: Benchmark configuration
      description: Include benchmark ID, context count/IDs, action set, seed, horizon, split, and any deviations.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and compute
      description: Include operating system, Python, accelerator/driver, dependency lock or image digest, peak memory, and elapsed time.
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Exact commands
      render: shell
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Artifacts and SHA256 hashes
      description: Link or attach summary.json, results.jsonl, report.md/report.html, evidence manifest, and hashes where public redistribution is allowed.
    validations:
      required: true
  - type: textarea
    id: interpretation
    attributes:
      label: Result and limitations
      description: Report the metric profile, unsupported metrics, uncertainty unit, failures, and the narrow claim supported by this run.
    validations:
      required: true
  - type: checkboxes
    id: integrity
    attributes:
      label: Evidence integrity
      options:
        - label: Every action branch uses the same restored initial context.
          required: true
        - label: The submitted result was generated by the revisions and commands above.
          required: true
        - label: No secret, private data, checkpoint, or unverifiable substituted output is attached.
          required: true
