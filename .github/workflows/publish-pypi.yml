name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag_confirmation:
        description: Must exactly match the selected Git tag (for example v0.1.0rc1)
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    if: ${{ github.ref_type == 'tag' && inputs.tag_confirmation == github.ref_name }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/wamprobe/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.6"
          enable-cache: true
      - name: Require tag and package version to match
        run: |
          package_version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          test "v${package_version}" = "${GITHUB_REF_NAME}"
      - name: Install locked development environment
        run: uv sync --extra dev --locked
      - name: Rebuild and verify candidate from the clean tag
        run: .venv/bin/python scripts/build_release_candidate.py
      - name: Stage distributions without the audit sidecar
        run: |
          mkdir -p dist/publish
          cp dist/release-candidate/*.whl dist/publish/
          cp dist/release-candidate/*.tar.gz dist/publish/
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/publish/
          verbose: true
